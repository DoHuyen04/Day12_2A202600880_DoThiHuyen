services:
  agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=staging
      - APP_NAME=KnowledgeBase RAG Agent
      - EMBEDDING_PROVIDER=mock
      - TOP_K=3
    env_file:
      - .env.local
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os,urllib.request; urllib.request.urlopen('http://localhost:'+os.environ.get('PORT','8000')+'/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
